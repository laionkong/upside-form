<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#131319">
<title>UPSIDE Playbook SDR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
*{-webkit-tap-highlight-color:transparent}
:root{
--surface:#131319;
--card:#1E1E26;
--border:#2A2A34;
--primary:#BFEA2E;
--text:#F2F2EE;
--muted:#8A8A9E;
--gold:#F5C542;
--orange:#F5A623;
--red:#E85454;
}
html{-webkit-text-size-adjust:100%}
body{
font-family:'Manrope',system-ui,-apple-system,sans-serif;
font-size:15px;
line-height:1.5;
color:var(--text);
background:var(--surface);
-webkit-font-smoothing:antialiased;
padding-bottom:80px;
}
h1,h2,h3,h4{font-family:'Space Grotesk',system-ui,sans-serif}

/* HEADER */
.header{
position:sticky;
top:0;
z-index:100;
background:var(--surface);
padding:12px 16px;
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:1px solid var(--border);
}
.header-brand{
font-family:'Space Grotesk',system-ui,sans-serif;
font-weight:700;
font-size:17px;
letter-spacing:0.5px;
}
.header-brand span{color:var(--primary)}
.header-sub{font-size:13px;color:var(--muted);font-weight:500;margin-left:8px}
.header-stats{
font-size:12px;
color:var(--muted);
text-align:right;
font-family:'Space Grotesk',system-ui,sans-serif;
font-weight:600;
}
.header-stats .hl{color:var(--primary)}

/* SEARCH */
.search-wrap{
position:sticky;
top:47px;
z-index:99;
background:var(--surface);
padding:8px 16px 8px;
}
.search-input{
width:100%;
padding:10px 14px;
font-size:16px;
font-family:'Manrope',system-ui,sans-serif;
border:1px solid var(--border);
border-radius:0;
background:var(--border);
color:var(--text);
outline:none;
-webkit-appearance:none;
}
.search-input:focus{border-color:var(--primary)}
.search-input::placeholder{color:var(--muted)}

/* CARDS */
.card{
margin:8px 16px;
background:var(--card);
border:1px solid var(--border);
border-left:4px solid var(--border);
overflow:hidden;
transition:border-color 0.2s,opacity 0.2s;
}
.card[data-status="contactado"]{border-left-color:var(--gold)}
.card[data-status="interesado"]{border-left-color:var(--primary);border-color:var(--primary)}
.card[data-status="no-contesta"]{border-left-color:var(--orange);opacity:0.7}
.card[data-status="rechazado"]{border-left-color:var(--red);opacity:0.5}

/* COLLAPSED HEADER */
.card-header{
padding:12px 14px;
cursor:pointer;
display:flex;
flex-wrap:wrap;
align-items:center;
gap:6px;
min-height:44px;
user-select:none;
-webkit-user-select:none;
}
.card-header:active{opacity:0.8}
.card-rank{
font-family:'Space Grotesk',system-ui,sans-serif;
font-weight:700;
font-size:13px;
color:var(--muted);
min-width:26px;
}
.card-name{
font-family:'Space Grotesk',system-ui,sans-serif;
font-weight:700;
font-size:17px;
flex:1;
min-width:100px;
color:var(--text);
}
.card[data-status="rechazado"] .card-name{text-decoration:line-through;color:var(--muted)}
.card[data-status="interesado"] .card-name{color:var(--primary)}
.score-pill{
font-family:'Space Grotesk',system-ui,sans-serif;
font-weight:700;
font-size:11px;
padding:2px 8px;
min-width:28px;
text-align:center;
}
.score-pill.high{background:var(--primary);color:var(--surface)}
.score-pill.mid{background:var(--border);color:var(--text)}
.score-pill.low{background:var(--border);color:var(--muted)}
.card-line2{
width:100%;
padding-left:26px;
display:flex;
align-items:center;
gap:8px;
margin-top:2px;
}
.ch-tag{
font-family:'Space Grotesk',system-ui,sans-serif;
font-weight:700;
font-size:10px;
padding:1px 6px;
text-transform:uppercase;
letter-spacing:0.5px;
}
.ch-tag.call{background:var(--primary);color:var(--surface)}
.ch-tag.wa{background:transparent;color:var(--primary);border:1px solid var(--primary)}
.card-vertical{font-size:12px;color:var(--muted)}

/* EXPANDED BODY */
.card-body{
display:none;
border-top:1px solid var(--border);
}
.card.expanded .card-body{display:block}

/* CHANNEL TABS */
.channel-tabs{
display:flex;
background:var(--surface);
border-bottom:1px solid var(--border);
}
.channel-tab{
flex:1;
padding:12px 8px;
font-family:'Space Grotesk',system-ui,sans-serif;
font-weight:700;
font-size:13px;
color:var(--muted);
cursor:pointer;
border-bottom:3px solid transparent;
text-align:center;
min-height:44px;
display:flex;
align-items:center;
justify-content:center;
gap:6px;
user-select:none;
-webkit-user-select:none;
}
.channel-tab:active{opacity:0.7}
.channel-tab.active{color:var(--text);border-bottom-color:var(--primary)}

/* DAY TABS */
.day-tabs{
display:flex;
background:var(--card);
border-bottom:1px solid var(--border);
}
.day-tab{
flex:1;
padding:12px 8px;
font-family:'Space Grotesk',system-ui,sans-serif;
font-weight:700;
font-size:12px;
color:var(--muted);
cursor:pointer;
border-bottom:3px solid transparent;
text-align:center;
min-height:44px;
display:flex;
align-items:center;
justify-content:center;
user-select:none;
-webkit-user-select:none;
}
.day-tab:active{opacity:0.7}
.day-tab.active{color:var(--text);border-bottom-color:var(--primary)}

/* SCRIPT ACCORDION */
.script-area{
padding:0 14px 14px;
}
.script-section{
border-bottom:1px solid var(--border);
}
.script-section:last-child{border-bottom:none}
.script-header{
padding:10px 0;
cursor:pointer;
display:flex;
align-items:center;
gap:8px;
min-height:44px;
user-select:none;
-webkit-user-select:none;
}
.script-arrow{
font-size:10px;
color:var(--muted);
transition:transform 0.2s,color 0.2s;
width:14px;
text-align:center;
flex-shrink:0;
}
.script-section.open .script-arrow{transform:rotate(90deg);color:var(--primary)}
.script-label{
font-family:'Space Grotesk',system-ui,sans-serif;
font-weight:600;
font-size:13px;
color:var(--muted);
transition:color 0.2s;
}
.script-section.open .script-label{color:var(--primary)}
.script-time{
font-size:11px;
color:var(--muted);
margin-left:auto;
}
.script-content{
display:none;
padding:0 0 12px 22px;
font-size:15px;
font-family:'Manrope',system-ui,sans-serif;
line-height:1.7;
color:var(--text);
}
.script-section.open .script-content{display:block}
.script-content p{margin-bottom:8px}
.script-content ol,.script-content ul{padding-left:18px;margin-bottom:8px}
.script-content li{margin-bottom:4px}
.script-content strong{font-weight:600}
.quote{
font-style:italic;
background:var(--card);
padding:14px;
margin:6px 0;
border-left:3px solid var(--primary);
font-size:15px;
line-height:1.6;
}
.objection{margin-bottom:10px}
.objection-q{font-weight:700;font-size:13px;margin-bottom:4px;color:var(--text)}
.objection-a{font-style:italic;padding-left:10px;border-left:2px solid var(--border);color:var(--muted)}

/* WA CONTENT */
.wa-content{padding:14px}
.wa-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;font-family:'Space Grotesk',system-ui}
.wa-script-box{background:var(--card);border-left:3px solid var(--primary);padding:14px;font-size:15px;line-height:1.6;color:var(--text);margin-bottom:12px}
.wa-actions{display:flex;gap:8px}
.wa-copy-btn{flex:1;padding:14px;background:var(--card);border:1px solid var(--primary);color:var(--primary);font-family:'Space Grotesk',system-ui;font-weight:700;font-size:13px;cursor:pointer;min-height:48px;border-radius:0}
.wa-send-btn{flex:1;padding:14px;background:var(--primary);color:var(--surface);font-family:'Space Grotesk',system-ui;font-weight:700;font-size:13px;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center;min-height:48px;border-radius:0}
.wa-copy-btn:active{background:var(--primary);color:var(--surface)}
.wa-disabled{padding:14px;color:var(--muted);font-size:13px;font-style:italic}
.wa-note{font-size:11px;color:var(--muted);margin-bottom:8px;font-style:italic}
.call-note{font-size:12px;color:var(--muted);font-style:italic;padding:10px 14px;border-bottom:1px solid var(--border)}

/* RESULT PILLS */
.result-bar{
display:flex;
gap:0;
padding:10px 14px;
border-top:1px solid var(--border);
}
.result-pill{
flex:1;
padding:10px 4px;
font-size:11px;
font-family:'Space Grotesk',system-ui,sans-serif;
font-weight:600;
background:transparent;
border:1px solid var(--border);
color:var(--muted);
cursor:pointer;
white-space:nowrap;
min-height:44px;
display:flex;
align-items:center;
justify-content:center;
user-select:none;
-webkit-user-select:none;
text-align:center;
transition:all 0.15s;
border-radius:0;
}
.result-pill:not(:last-child){border-right:none}
.result-pill:active{transform:scale(0.96);opacity:0.8}
.result-pill.active.contactado{background:rgba(245,197,66,0.08);color:var(--gold);border-color:var(--gold);box-shadow:inset 0 -3px 0 var(--gold)}
.result-pill.active.interesado{background:rgba(191,234,46,0.08);color:var(--primary);border-color:var(--primary);box-shadow:inset 0 -3px 0 var(--primary)}
.result-pill.active.no-contesta{background:rgba(245,166,35,0.08);color:var(--orange);border-color:var(--orange);box-shadow:inset 0 -3px 0 var(--orange)}
.result-pill.active.rechazado{background:rgba(232,84,84,0.08);color:var(--red);border-color:var(--red);box-shadow:inset 0 -3px 0 var(--red)}

/* NOTES */
.notes-wrap{
padding:10px 14px;
border-top:1px solid var(--border);
}
.igor-notes{
width:100%;
background:var(--surface);
border:1px solid var(--border);
color:var(--text);
font-family:'Manrope',system-ui,sans-serif;
font-size:16px;
padding:10px;
min-height:50px;
resize:vertical;
border-radius:0;
-webkit-appearance:none;
}
.igor-notes:focus{border-color:var(--primary);outline:none}
.igor-notes::placeholder{color:var(--muted)}

/* TOAST */
.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%) translateY(80px);
background:var(--primary);
color:var(--surface);
font-family:'Space Grotesk',system-ui,sans-serif;
font-weight:700;
font-size:14px;
padding:10px 24px;
z-index:200;
opacity:0;
transition:transform 0.3s,opacity 0.3s;
pointer-events:none;
border-radius:0;
}
.toast.show{
transform:translateX(-50%) translateY(0);
opacity:1;
}

/* FOOTER */
.footer{
text-align:center;
padding:24px 16px;
font-size:11px;
color:var(--muted);
letter-spacing:0.3px;
border-top:1px solid var(--border);
}
.hidden{display:none!important}

/* CALL MODE MODAL */
.call-mode {
  position: fixed;
  top: 0; left: 0; width: 100%;
  height: 100dvh;
  height: -webkit-fill-available;
  z-index: 1000;
  background: var(--surface);
  display: flex;
  flex-direction: column;
  padding: 0 16px;
  padding-bottom: env(safe-area-inset-bottom, 16px);
  overflow: hidden;
}
.call-mode.hidden { display: none; }

/* TOP BAR: back + progress */
.call-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 0;
  flex-shrink: 0;
}
.call-back {
  font-size: 14px;
  color: var(--muted);
  font-family: 'Space Grotesk', system-ui;
  font-weight: 600;
  cursor: pointer;
  padding: 8px 12px 8px 0;
  min-height: 44px;
  display: flex;
  align-items: center;
}
.call-back:active { color: var(--primary); }
.call-progress-dots {
  display: flex;
  gap: 6px;
  align-items: center;
}
.call-dot {
  width: 8px; height: 8px;
  background: var(--border);
  transition: all 0.2s ease;
}
.call-dot.active { background: var(--primary); transform: scale(1.3); }
.call-dot.done { background: var(--muted); }
.call-step-label {
  font-size: 12px;
  color: var(--muted);
  font-family: 'Space Grotesk', system-ui;
  font-weight: 600;
  margin-right: 8px;
}

/* PROSPECT NAME */
.call-prospect-name {
  font-size: 13px;
  color: var(--muted);
  text-align: center;
  padding-bottom: 8px;
  font-family: 'Space Grotesk', system-ui;
  flex-shrink: 0;
}

/* SCRIPT TEXT AREA */
.call-text-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px 0;
}
.call-text {
  font-family: 'Manrope', system-ui;
  font-size: 19px;
  line-height: 1.6;
  color: var(--text);
  text-align: center;
  max-width: 100%;
}
.call-text strong { color: var(--primary); font-weight: 700; }

/* SECTION LABEL */
.call-section-label {
  font-size: 11px;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-family: 'Space Grotesk', system-ui;
  font-weight: 700;
  text-align: center;
  margin-bottom: 12px;
}

/* INLINE CAPTURE */
.call-capture {
  padding: 0 16px;
  margin-bottom: 12px;
}
.capture-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--primary);
  font-family: 'Space Grotesk', system-ui;
  letter-spacing: 1px;
  margin-bottom: 6px;
  opacity: 0.7;
}
.capture-input {
  width: 100%;
  padding: 12px;
  background: rgba(191,234,46,0.06);
  border: 1px solid rgba(191,234,46,0.2);
  color: var(--text);
  font-family: 'Manrope', system-ui;
  font-size: 16px;
  outline: none;
  transition: border-color 0.2s;
}
.capture-input::placeholder {
  color: var(--muted);
  font-size: 13px;
  font-style: italic;
}
.capture-input:focus {
  border-color: var(--primary);
  background: rgba(191,234,46,0.1);
}

/* BUTTONS */
.call-buttons {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 16px 0;
  flex-shrink: 0;
}
.call-btn {
  padding: 18px 16px;
  font-size: 16px;
  font-weight: 700;
  font-family: 'Space Grotesk', system-ui;
  border: none;
  cursor: pointer;
  min-height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  transition: all 0.15s ease;
  -webkit-tap-highlight-color: transparent;
}
.call-btn:active { transform: scale(0.97); }
.call-btn.primary { background: var(--primary); color: var(--surface); }
.call-btn.primary:active { background: #A8D624; }
.call-btn.secondary { background: transparent; border: 2px solid var(--border); color: var(--muted); }
.call-btn.secondary:active { background: var(--border); color: var(--text); }
.call-btn.danger { background: var(--red); color: var(--text); }
.call-btn.danger:active { background: #D64545; }
.call-btn.gold { background: var(--gold); color: var(--surface); }

/* OBJECTION OVERLAY */
.objection-panel {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--card);
  border-top: 2px solid var(--primary);
  padding: 20px 16px;
  padding-bottom: env(safe-area-inset-bottom, 20px);
  max-height: 75dvh;
  overflow-y: auto;
  z-index: 1001;
  transform: translateY(100%);
  transition: transform 0.3s ease;
}
.objection-panel.show { transform: translateY(0); }
.objection-panel-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--primary);
  font-family: 'Space Grotesk', system-ui;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 16px;
}
.objection-card {
  padding: 14px;
  margin-bottom: 10px;
  background: var(--surface);
  border-left: 3px solid var(--border);
  cursor: pointer;
  transition: all 0.15s ease;
}
.objection-card:active { border-left-color: var(--primary); }
.objection-card.expanded { border-left-color: var(--primary); background: var(--card); }
.objection-card-q { font-weight: 700; font-size: 14px; color: var(--text); }
.objection-card-a { display: none; font-size: 14px; color: var(--text); line-height: 1.6; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.objection-card.expanded .objection-card-a { display: block; }
.objection-close-btn {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  background: var(--primary);
  color: var(--surface);
  border: none;
  font-size: 14px;
  font-weight: 700;
  font-family: 'Space Grotesk', system-ui;
  cursor: pointer;
}

/* OUTCOME SCREEN */
.call-outcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 24px;
  text-align: center;
}
.outcome-status {
  font-size: 28px;
  font-weight: 700;
  font-family: 'Space Grotesk', system-ui;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.outcome-status.success { color: var(--primary); }
.outcome-status.fail { color: var(--red); }
.outcome-status.neutral { color: var(--gold); }
.outcome-prospect { font-size: 16px; color: var(--muted); }
.outcome-notes {
  width: 100%;
  padding: 14px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Manrope', system-ui;
  font-size: 16px;
  min-height: 80px;
  resize: none;
}
.outcome-notes:focus { border-color: var(--primary); outline: none; }

/* MODO LLAMADA BUTTON (inside card) */
.btn-call-mode {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  background: var(--primary);
  color: var(--surface);
  border: none;
  font-size: 14px;
  font-weight: 700;
  font-family: 'Space Grotesk', system-ui;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: pointer;
}
.btn-call-mode:active { background: #A8D624; }
</style>
</head>
<body>

<div class="header">
<div>
<span class="header-brand">UPSIDE<span>.</span></span>
<span class="header-sub">Playbook SDR</span>
</div>
<div class="header-stats" id="headerStats">0/17</div>
</div>

<div class="search-wrap">
<input type="text" class="search-input" id="searchInput" placeholder="Buscar prospecto...">
</div>

<div id="cardList"></div>

<div class="footer">UPSIDE &middot; Automatizaci&oacute;n Comercial</div>

<div class="toast" id="toast"></div>

<div id="callMode" class="call-mode hidden"></div>
<div id="objectionPanel" class="objection-panel"></div>

<script>
// ==================== FOLLOW-UP TEMPLATES BY VERTICAL ====================
var FOLLOWUPS = {
"Sal\u00f3n": "Hola de nuevo, retomo mi mensaje anterior. Con el volumen de consultas que manejan, creo que el agente de WhatsApp les ahorrar\u00eda varias horas al d\u00eda. \u00bfTienen 15 minutos esta semana para que les muestre c\u00f3mo funciona?",
"Spa": "Hola de nuevo, retomo mi mensaje anterior. Con el volumen de consultas que manejan, creo que el agente de WhatsApp les ahorrar\u00eda varias horas al d\u00eda. \u00bfTienen 15 minutos esta semana para que les muestre c\u00f3mo funciona?",
"Gym": "Hola, retomo mi mensaje. Cada trial que no recibe follow-up autom\u00e1tico es una membres\u00eda perdida. \u00bfLes puedo mostrar en 15 minutos c\u00f3mo funciona el sistema? Sin compromiso.",
"Restaurante": "Hola, retomo mi mensaje sobre las reservaciones. Cada solicitud de evento que llega fuera de horario y no se responde r\u00e1pido se va con la competencia. \u00bfTienen 15 minutos para una demo r\u00e1pida?",
"Inmobiliaria": "Hola, retomo mi mensaje. En bienes ra\u00edces, el primer agente que responde se queda con el deal. \u00bfLes puedo mostrar en 15 minutos c\u00f3mo el agente responde con fotos y agenda visitas autom\u00e1ticamente?",

var callState = { slug: null, step: 0, steps: [], prospect: null };

// Helper: strip HTML tags and return plain text
function stripHtml(html) {
  if (!html) return '';
  var tmp = document.createElement('div');
  tmp.innerHTML = html;
  var text = tmp.textContent || tmp.innerText || '';
  // Clean up extra whitespace
  text = text.replace(/\s+/g, ' ').trim();
  return text;
}

// Helper: extract individual questions from Discovery HTML content
function extractQuestions(html) {
  if (!html) return [''];
  var tmp = document.createElement('div');
  tmp.innerHTML = html;
  // Try <li> elements first
  var items = tmp.querySelectorAll('li');
  if (items.length > 0) {
    var qs = [];
    for (var i = 0; i < items.length; i++) {
      var t = items[i].textContent.trim();
      if (t.length > 10) qs.push(t);
    }
    if (qs.length > 0) return qs;
  }
  // Try splitting by question marks followed by whitespace
  var text = stripHtml(html);
  var byQuestion = text.split(/\?\s+/);
  if (byQuestion.length >= 2) {
    var qs2 = [];
    for (var j = 0; j < byQuestion.length; j++) {
      var q = byQuestion[j].trim();
      if (q.length > 15) qs2.push(q + '?');
    }
    // Remove trailing ? from last if it was already there
    if (qs2.length > 0) {
      var last = qs2[qs2.length - 1];
      if (last.endsWith('??')) qs2[qs2.length - 1] = last.slice(0, -1);
    }
    if (qs2.length >= 2) return qs2;
  }
  // Fallback: split by numbered pattern
  var parts = text.split(/(?:\d+[\.\)]\s*)/);
  parts = parts.filter(function(p) { return p.trim().length > 15; });
  if (parts.length >= 2) return parts;
  // Last fallback: return whole text
  return [text];
}

// Helper: truncate text to N sentences
function truncateToSentences(text, maxSentences) {
  var sentences = text.split(/(?<=[.!?])\s+/);
  if (sentences.length <= maxSentences) return text;
  return sentences.slice(0, maxSentences).join(' ');
}

function buildSteps(p) {
  var steps = [];
  var cs = p.callScript;

  // Step 0: Presentacion
  steps.push({
    section: 'Presentaci\u00f3n',
    text: stripHtml(cs[0] ? cs[0].content : ''),
    buttons: [{ label: 'PEDIR PERMISO', type: 'primary', action: 'next' }]
  });

  // Step 1: Permiso
  steps.push({
    section: 'Permiso',
    text: '\u00bfLe robo 2 minutos? Es r\u00e1pido.',
    buttons: [
      { label: 'HACER PREGUNTAS', type: 'primary', action: 'next' },
      { label: 'OTRO D\u00cdA', type: 'gold', action: 'reschedule' }
    ]
  });

  // Discovery: one step per question
  var questions = extractQuestions(cs[1] ? cs[1].content : '');
  for (var qi = 0; qi < questions.length; qi++) {
    steps.push({
      section: 'Pregunta ' + (qi+1) + ' de ' + questions.length,
      text: questions[qi],
      buttons: [
        { label: qi < questions.length - 1 ? 'SIGUIENTE PREGUNTA' : 'IR AL PROBLEMA', type: 'primary', action: 'next' },
        { label: 'NO LE INTERESA', type: 'secondary', action: 'objection' }
      ]
    });
  }

  // El problema (was Agitar dolor)
  if (cs[2]) {
    steps.push({
      section: 'El problema',
      text: stripHtml(cs[2].content),
      buttons: [
        { label: 'PRESENTAR SOLUCI\u00d3N', type: 'primary', action: 'next' },
        { label: 'OBJECI\u00d3N', type: 'secondary', action: 'objection' }
      ]
    });
  }

  // La solucion
  if (cs[3]) {
    steps.push({
      section: 'La soluci\u00f3n',
      text: truncateToSentences(stripHtml(cs[3].content), 3),
      buttons: [
        { label: 'CERRAR LA LLAMADA', type: 'primary', action: 'next' },
        { label: 'NO GRACIAS', type: 'danger', action: 'reject' }
      ]
    });
  }

  // Cierre (was CTA) -- outcome buttons only
  if (cs[4]) {
    steps.push({
      section: 'Cierre',
      text: stripHtml(cs[4].content),
      buttons: [
        { label: 'AGENDAR DEMO', type: 'primary', action: 'book' },
        { label: 'M\u00c1NDAME INFO', type: 'gold', action: 'info' },
        { label: 'NO GRACIAS', type: 'danger', action: 'reject' }
      ]
    });
  }

  return steps;
}

function renderStep() {
  if (callState.step < 0 || callState.step >= callState.steps.length) {
    renderOutcome('book');
    return;
  }
  var s = callState.steps[callState.step];
  if (!s) { renderOutcome('book'); return; }
  var totalSteps = callState.steps.length;
  var p = callState.prospect;

  // Progress dots
  var dots = '';
  for (var d = 0; d < totalSteps; d++) {
    var cls = d < callState.step ? 'done' : d === callState.step ? 'active' : '';
    dots += '<div class="call-dot ' + cls + '"></div>';
  }

  // Buttons
  var btns = '';
  for (var b = 0; b < s.buttons.length; b++) {
    btns += '<button class="call-btn ' + s.buttons[b].type + '" data-action="' + s.buttons[b].action + '">' + s.buttons[b].label + '</button>';
  }

  // Detect if this is a discovery or pitch step
  var isQuestion = s.section && s.section.toLowerCase().indexOf('pregunta') !== -1;
  var isPitchStep = s.section && (s.section.toLowerCase().indexOf('problema') !== -1 || s.section.toLowerCase().indexOf('soluci') !== -1);

  var captureHtml = '';
  if (isQuestion || isPitchStep) {

      'autocomplete="off" />' +
      '</div>';
  }

  var html = '<div class="call-top">' +
    '<div class="call-back" data-action="back">&lsaquo; Atr&aacute;s</div>' +
    '<div class="call-step-label">' + (callState.step + 1) + '/' + totalSteps + '</div>' +
    '<div class="call-progress-dots">' + dots + '</div>' +

  document.getElementById('callMode').innerHTML = html;

  // Save current step
  localStorage.setItem(PREFIX + 'cm_' + callState.slug, String(callState.step));

}

function startCallMode(slug) {
  var p = getProspect(slug);
  if (!p) return;

  callState.slug = slug;
  callState.prospect = p;
  callState.steps = buildSteps(p);

  // Check for saved step
  var savedStep = localStorage.getItem(PREFIX + 'cm_' + slug);
  callState.step = savedStep ? parseInt(savedStep) : 0;

  var modal = document.getElementById('callMode');
  modal.classList.remove('hidden');
  renderStep();

  // Prevent body scroll
  document.body.style.overflow = 'hidden';
}

function closeCallMode() {
  var modal = document.getElementById('callMode');
  modal.classList.add('hidden');
  modal.innerHTML = '';
  document.body.style.overflow = '';

  // Save any outcome notes
  var notesEl = document.getElementById('outcomeNotes');
  if (notesEl && callState.slug && notesEl.value.trim()) {
    setN(callState.slug, notesEl.value.trim());
  }

  localStorage.removeItem(PREFIX + 'cm_' + callState.slug);
  callState = { slug: null, step: 0, steps: [], prospect: null };

  // Re-render cards to reflect status changes
  renderAll();
}

function handleCallAction(action) {
  if (action !== 'closeobjection' && callProcessing) return;
  callProcessing = true;
  setTimeout(function(){ callProcessing = false; }, 300);
  var panel = document.getElementById('objectionPanel');

  switch(action) {
    case 'next':
      // Save any note input before advancing
      var noteIn = document.getElementById('stepNoteInput');
      if (noteIn && noteIn.value.trim()) {
        setCallNote(callState.slug, callState.step, noteIn.value);
      }
      callState.step++;
      if (callState.step >= callState.steps.length) {
        renderOutcome('book'); // Reached end = assume booking
      } else {
        renderStep();
      }
      break;
    case 'back':
      // Save any note input before going back
      var noteInBack = document.getElementById('stepNoteInput');
      if (noteInBack && noteInBack.value.trim()) {
        setCallNote(callState.slug, callState.step, noteInBack.value);
      }
      if (callState.step > 0) {
        callState.step--;
        renderStep();
      } else {
        closeCallMode();
      }
      break;
    case 'objection':
      showObjections();
      break;
    case 'closeobjection':
      panel.classList.remove('show');
      break;
    case 'book':
      renderOutcome('book');
      break;
    case 'info':
      renderOutcome('info');
      break;
    case 'reject':
      renderOutcome('reject');
      break;
    case 'reschedule':
      renderOutcome('reschedule');
      break;
    case 'nextprospect':
      // Save notes
      var notesEl = document.getElementById('outcomeNotes');
      if (notesEl && callState.slug && notesEl.value.trim()) {
        setN(callState.slug, notesEl.value.trim());
      }
      closeCallMode();
      // Scroll to next pending card
      setTimeout(function() {
        var cards = document.querySelectorAll('#cardList .card');
        for (var i = 0; i < cards.length; i++) {
          var s = getS(cards[i].getAttribute('data-slug'));
          if (s === 'pendiente') {
            cards[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
            break;
          }
        }
      }, 300);
      break;
    case 'close':
      closeCallMode();
      break;
  }
}

// ==================== EVENT DELEGATION ====================
document.addEventListener('click', function(e){
var t = e.target;

// Call mode actions
var callAction = t.closest('[data-action]');
if (callAction && (t.closest('.call-mode') || t.closest('.objection-panel'))) {
  e.preventDefault();
  e.stopPropagation();
  var action = callAction.getAttribute('data-action');
  handleCallAction(action);
  return;
}

// Objection card expand
var objCard = t.closest('.objection-card');
if (objCard && !t.closest('.objection-close-btn')) {
  objCard.classList.toggle('expanded');
  return;
}

// MODO LLAMADA button
var callModeBtn = t.closest('.btn-call-mode');
if (callModeBtn) {
  e.preventDefault();
  e.stopPropagation();
  var slug = callModeBtn.closest('.card').getAttribute('data-slug');
  startCallMode(slug);
  return;
}

// Textarea / capture input
if(t.closest('.igor-notes')) return;
if(t.closest('.capture-input')) return;

// WA copy button
var copyBtn = t.closest('[data-action="copy"]');
if(copyBtn){
e.preventDefault();
e.stopPropagation();
var waContent = copyBtn.closest('.wa-content');
var waBox = waContent ? waContent.querySelector('.wa-script-box') : null;
if(waBox){
var text = waBox.textContent;
if(navigator.clipboard && navigator.clipboard.writeText){
navigator.clipboard.writeText(text).then(function(){
copyBtn.textContent = 'COPIADO';
showToast('Script copiado');
setTimeout(function(){ copyBtn.textContent = 'COPIAR SCRIPT'; }, 2000);
});
} else {
var ta = document.createElement('textarea');
ta.value = text;
ta.style.position='fixed';
ta.style.left='-9999px';
document.body.appendChild(ta);
ta.select();
document.execCommand('copy');
document.body.removeChild(ta);
copyBtn.textContent = 'COPIADO';
showToast('Script copiado');
setTimeout(function(){ copyBtn.textContent = 'COPIAR SCRIPT'; }, 2000);
}
}
return;
}

// WA send button - let it through (it's an <a> tag)
if(t.closest('.wa-send-btn')) return;

// Result pill
var rp = t.closest('.result-pill');
if(rp){
e.preventDefault();
e.stopPropagation();
var card = rp.closest('.card');
var slug = card.getAttribute('data-slug');
var newStatus = rp.getAttribute('data-rs');
var oldStatus = getS(slug);
if(oldStatus === newStatus){
setS(slug,'pendiente');
card.setAttribute('data-status','pendiente');
}else{
setS(slug,newStatus);
card.setAttribute('data-status',newStatus);
}
var pills = card.querySelectorAll('.result-pill');
var cur = getS(slug);
for(var i=0;i<pills.length;i++){
if(pills[i].getAttribute('data-rs')===cur) pills[i].classList.add('active');
else pills[i].classList.remove('active');
}
var nameEl = card.querySelector('.card-name');
if(nameEl){nameEl.style=''}
updateStats();
if(cur!=='pendiente'){
setTimeout(function(){
var cards = document.querySelectorAll('#cardList .card');
for(var j=0;j<cards.length;j++){
if(getS(cards[j].getAttribute('data-slug'))==='pendiente' && !cards[j].classList.contains('hidden')){
cards[j].scrollIntoView({behavior:'smooth',block:'center'});
break;
}
}
},300);
}
return;
}

// Channel tab
var chTab = t.closest('.channel-tab');
if(chTab){
e.preventDefault();
e.stopPropagation();
var card = chTab.closest('.card');
var slug = card.getAttribute('data-slug');
var ch = chTab.getAttribute('data-ch');
setCh(slug, ch);
card.setAttribute('data-channel', ch);
var tabs = card.querySelectorAll('.channel-tab');
for(var i=0;i<tabs.length;i++){tabs[i].classList.remove('active')}
chTab.classList.add('active');
refreshDayContent(card);
return;
}

// Day tab
var dt = t.closest('.day-tab');
if(dt){
e.preventDefault();
e.stopPropagation();
var card = dt.closest('.card');
var slug = card.getAttribute('data-slug');
var p = getProspect(slug);
var di = parseInt(dt.getAttribute('data-di'));
setD(slug,di);
// Auto-select best channel for this day
var best = bestChannel(p, di);
card.setAttribute('data-channel', best);
setCh(slug, best);
// Update day tabs
var tabs = card.querySelectorAll('.day-tab');
for(var i=0;i<tabs.length;i++){tabs[i].classList.remove('active')}
dt.classList.add('active');
// Update channel tabs visually
var chTabs = card.querySelectorAll('.channel-tab');
for(var i=0;i<chTabs.length;i++){
chTabs[i].classList.remove('active');
if(chTabs[i].getAttribute('data-ch')===best) chTabs[i].classList.add('active');
}
refreshDayContent(card);
return;
}

// Script accordion
var sh = t.closest('.script-header');
if(sh){
var sec = sh.closest('.script-section');
if(sec) sec.classList.toggle('open');
return;
}

// Card header - toggle expand
var ch = t.closest('.card-header');
if(ch){
e.preventDefault();
var card = ch.closest('.card');
card.classList.toggle('expanded');
return;
}
}, false);

// ==================== NOTES SAVE ====================
document.addEventListener('focusout', function(e){
if(e.target && e.target.classList.contains('igor-notes')){
var card = e.target.closest('.card');
if(card) setN(card.getAttribute('data-slug'), e.target.value);
}
}, false);

// ==================== SEARCH ====================
document.getElementById('searchInput').addEventListener('input', function(){
var q = this.value.toLowerCase().trim();
var cards = document.querySelectorAll('#cardList .card');
for(var i=0;i<cards.length;i++){
var slug = cards[i].getAttribute('data-slug');
var p = getProspect(slug);
if(!q || (p && (p.name.toLowerCase().indexOf(q)!==-1 || p.vertical.toLowerCase().indexOf(q)!==-1 || p.zone.toLowerCase().indexOf(q)!==-1))){
cards[i].style.display='';
cards[i].classList.remove('hidden');
}else{
cards[i].style.display='none';
cards[i].classList.add('hidden');
}
}
});

// ==================== INIT ====================
// Reset day and channel to defaults (HOY + strategy-based channel)
// Status and notes are preserved
for(var i=0;i<PROSPECTS.length;i++){
localStorage.removeItem(PREFIX+'d_'+PROSPECTS[i].slug);
localStorage.removeItem(PREFIX+'ch_'+PROSPECTS[i].slug);
}
renderAll();
</script>
</body>
</html>
